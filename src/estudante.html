<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/estudante.css">
    <link rel="stylesheet" href="styles/denuncias.css">
    <title>Acompanhar Denúncia</title>
</head>

<body>

    <header>

        <div class="title">

            <h1 id="titulo">Bem-Vindo</h1>

        </div>

    </header>

    <main>

        <section>

            <div class="containners">

                <div class="contanner1">

                    <div class="comentario1">

                        <h3>@usuario:</h3>
                        <p>Ameei o aplicativo!!</p>

                    </div>

                    <div class="comentario2">

                        <h3>@usuario:</h3>
                        <p>Ameei o aplicativo!!</p>

                    </div>

                    <div class="comentario3">

                        <h3>@usuario:</h3>
                        <p>Ameei o aplicativo!!</p>

                    </div>

                    <div class="comentario4">

                        <h3>@usuario:</h3>
                        <p>Ameei o aplicativo!!</p>

                    </div>

                    <div class="botaoComente">

                        <button type="button" id="abrirComentario">Comente</button>

                    </div>

                </div>

                <div class="contanner2">

                    <h2>Acompanhe sua denúncia</h2>

                    <div class="campoProtocolo">

                        <label for="protocolo">
                            Digite seu protocolo:
                        </label>

                        <input
                            type="text"
                            id="protocolo"
                            name="protocolo"
                        >

                    </div>

                    <button id="botaoAcompanhar">
                        Acompanhar
                    </button>

                </div>

                <div class="contanner3">

                    <h2>Notícias</h2>

                    <div class="noticia1">

                        <p>
                            Em breve, novas funcionalidades
                        </p>

                    </div>

                    <div class="noticia2">

                        <p>
                            Atualização disponível
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- JANELA DE COMENTÁRIO -->

<div class="modalComentario" id="modalComentario">

    <div class="janelaComentario">

        <button
            type="button"
            class="fecharComentario"
            id="fecharComentario"
        >
            ✕
        </button>

        <h2>Deixe seu comentário</h2>

        <form id="formComentario">

            <div class="campoComentario">

                <label for="nomeUsuario">
                    Nome de usuário
                </label>

                <input
                    type="text"
                    id="nomeUsuario"
                    placeholder="Exemplo: Gabriel"
                    maxlength="20"
                    required
                >

            </div>

            <div class="campoComentario">

                <label for="textoComentario">
                    Comentário
                </label>

                <textarea
                    id="textoComentario"
                    rows="5"
                    maxlength="60"
                    placeholder="Escreva seu comentário..."
                    required
                ></textarea>

                <div class="contadorComentario">

                    <span id="quantidadeCaracteres">0</span>/60

                </div>

            </div>

            <button
                type="submit"
                class="botaoPublicarComentario"
            >
                Comentar
            </button>

        </form>

    </div>

</div>

<script src="js/comentarios/storage.js"></script>
<script src="js/comentarios/render.js"></script>
<script src="js/comentarios/modal.js"></script>

<script src="js/noticias/storage.js"></script>
<script src="js/noticias/render.js"></script>
<script src="js/estudante/consulta.js"></script>

</body>

</html>
