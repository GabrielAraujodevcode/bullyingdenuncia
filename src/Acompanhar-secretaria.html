<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <link rel="stylesheet" href="styles/global.css">

    <link
        rel="stylesheet"
        href="styles/acompanhar-scretaria.css"
    >

    <title>Acompanhar Denúncias</title>
</head>

<body>

    <header>

        <div class="title">

            <h1>Acompanhe denúncias</h1>

        </div>

    </header>

    <main>

        <section class="areaSecretaria">

            <div class="containerTabela">

                <div class="cabecalhoTabela">

                    <div>

                        <h2>Denúncias recebidas</h2>

                        <p>
                            Consulte e atualize as denúncias enviadas.
                        </p>

                    </div>

                </div>

                <div class="tabelaResponsiva">

                    <table>

                        <thead>

                            <tr>

                                <th>Protocolo</th>
                                <th>Status</th>
                                <th>Ação</th>

                            </tr>

                        </thead>

                        <tbody id="listaDenuncias">

                            <!-- As denúncias serão inseridas pelo JavaScript -->

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

    <!-- JANELA PARA AVERIGUAR A DENÚNCIA -->

    <div
        class="modalDenuncia"
        id="modalDenuncia"
    >

        <div class="janelaDenuncia">

            <button
                type="button"
                class="fecharModal"
                id="fecharModalDenuncia"
            >
                ✕
            </button>

            <h2>Averiguar denúncia</h2>

            <div class="protocoloModal">

                <span>Protocolo</span>

                <strong id="protocoloModal"></strong>

            </div>

            <div class="dadosDenuncia">

                <div class="campoVisualizacao">

                    <label>Usuário</label>

                    <p id="usuarioDenuncia"></p>

                </div>

                <div class="campoVisualizacao">

                    <label>Onde ocorreu?</label>

                    <p id="localDenuncia"></p>

                </div>

                <div class="campoVisualizacao">

                    <label>Quem praticou?</label>

                    <p id="autorDenuncia"></p>

                </div>

                <div class="campoVisualizacao">

                    <label>Tipo de bullying</label>

                    <p id="tipoDenuncia"></p>

                </div>

                <div class="campoVisualizacao campoCompleto">

                    <label>Relato</label>

                    <p id="relatoDenuncia"></p>

                </div>

            </div>

            <form id="formAtualizarDenuncia">

                <div class="campoAtualizacao">

                    <label for="novoStatus">
                        Atualizar status
                    </label>

                    <select id="novoStatus" required>

                        <option value="Em análise">
                            Em análise
                        </option>

                        <option value="Em andamento">
                            Em andamento
                        </option>

                        <option value="Concluída">
                            Concluída
                        </option>

                    </select>

                </div>

                <div class="campoAtualizacao">

                    <label for="mensagemSecretaria">
                        Mensagem para o aluno
                    </label>

                    <textarea
                        id="mensagemSecretaria"
                        rows="5"
                        maxlength="300"
                        placeholder="Digite uma mensagem para o aluno..."
                        required
                    ></textarea>

                    <div class="contadorMensagem">

                        <span id="contadorMensagem">0</span>/300

                    </div>

                </div>

                <button
                    type="submit"
                    class="botaoAtualizar"
                >
                    Salvar atualização
                </button>

            </form>

        </div>

    </div>

<script src="js/login/auth.js"></script>
<script src="js/login/ProtegerPagina.js"></script>

<script src="js/shared/api.js"></script>

<script src="js/secretaria/elementos.js"></script>
<script src="js/secretaria/modal.js"></script>
<script src="js/secretaria/tabela.js"></script>
<script src="js/secretaria/atualizar.js"></script>
<script src="js/secretaria/main.js"></script>

</body>

</html>
